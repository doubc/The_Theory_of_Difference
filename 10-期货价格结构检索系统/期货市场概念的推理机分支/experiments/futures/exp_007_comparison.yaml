experiment:
  id: exp_007
  name: 系统行为三组对比
  description: |
    同一基础拓扑，三个维度各跑一次，观察系统行为变化。
    对比A：无破缺（threshold=9999）→ 纯积累会怎样？
    对比B：快衰减（decay=0.80）→ recurrent 快速消退能否收敛？
    对比C：通道翻倍（warehouse=70, delivery=90）→ 结构性缺口填上能否收敛？
    
    基准：exp_006a（无干预，threshold=90, decay=0.95/0.93, capacity=35/45）

world:
  name: Comparison-World
  max_steps: 40

break_thresholds:
  inventory: 90
  liquidity: 80
  expectation: 100
  margin: 80
  delivery: 70
  basis: 90
  rule: 70

differences:
  - id: inventory_shortage
    type: inventory
    source_node: region_A
    target_node: exchange_delivery
    magnitude: 100
    visibility: 0.95
    persistence: 0.9
    transformability: 0.9
    recurrent: true
    recurrent_rate: 0.18
    recurrent_decay: 0.95
    description: 库存短缺

  - id: delivery_pressure
    type: delivery
    source_node: near_month
    target_node: exchange
    magnitude: 80
    visibility: 0.95
    persistence: 0.92
    transformability: 0.7
    recurrent: true
    recurrent_rate: 0.22
    recurrent_decay: 0.93
    description: 交割压力

  - id: expectation_bullish
    type: expectation
    source_node: market
    target_node: price
    magnitude: 60
    visibility: 0.85
    persistence: 0.7
    transformability: 0.8
    recurrent: true
    recurrent_rate: 0.15
    recurrent_decay: 0.95
    description: 看涨预期

entities:
  - id: industrial_short_001
    type: industrial_short
    capacity: 50
    available_capacity: 30
    risk_tolerance: 35
    liquidity: 40
    leverage: 2.0
    preference: short
    description: 产业空头

  - id: speculative_long_001
    type: speculator
    capacity: 80
    available_capacity: 60
    risk_tolerance: 70
    liquidity: 55
    leverage: 2.0
    preference: long
    description: 投机多头

  - id: speculator_002
    type: speculator
    capacity: 60
    available_capacity: 45
    risk_tolerance: 50
    liquidity: 40
    leverage: 1.5
    preference: long
    description: 投机多头二号

  - id: exchange_001
    type: exchange
    capacity: 150
    available_capacity: 120
    risk_tolerance: 100
    liquidity: 100
    leverage: 1.0
    preference: neutral
    description: 交易所

channels:
  - id: warehouse_receipt_channel
    from_type: inventory
    to_type: delivery
    base_cost: 15
    capacity: 35
    openness: 0.85
    description: 库存->交割
    entities:
      - industrial_short_001

  - id: delivery_channel
    from_type: delivery
    to_type: basis
    base_cost: 20
    capacity: 45
    openness: 0.8
    description: 交割->基差
    entities:
      - industrial_short_001
      - exchange_001

  - id: basis_channel
    from_type: basis
    to_type: price
    base_cost: 12
    capacity: 80
    openness: 0.9
    description: 基差->价格
    entities:
      - speculative_long_001
      - speculator_002

  - id: futures_contract_channel
    from_type: expectation
    to_type: price
    base_cost: 10
    capacity: 100
    openness: 0.95
    description: 预期->价格
    entities:
      - speculative_long_001
      - speculator_002

  - id: margin_clearing_channel
    from_type: price
    to_type: margin
    base_cost: 8
    capacity: 60
    openness: 0.9
    description: 价格->保证金
    entities:
      - speculative_long_001
      - speculator_002

  - id: position_reduction_channel
    from_type: margin
    to_type: liquidity
    base_cost: 12
    capacity: 50
    openness: 0.85
    description: 保证金->流动性
    entities:
      - speculative_long_001
      - speculator_002

  - id: exchange_rule_channel
    from_type: delivery
    to_type: rule
    base_cost: 50
    capacity: 80
    openness: 0.6
    description: 交割->规则
    entities:
      - exchange_001
