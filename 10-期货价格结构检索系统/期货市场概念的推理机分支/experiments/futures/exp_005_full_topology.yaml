experiment:
  id: exp_005
  name: 完整拓扑验证（参数调优）
  description: |
    验证反馈循环+干预多动作+变形链的完整拓扑。
    差异源：库存短缺（recurrent）+ 近月交割压力（recurrent）。
    预期：变形链 inventory→delivery→basis→price→margin→liquidity。
    预期：反馈差异 margin/liquidity 从承接体生成。
    预期：交易所三重干预后破缺减少，但产生副作用差异。

    调优说明（v2）：
    - recurrent_rate 降低，让生成 < channel 排放能力
    - break_threshold 提高，给系统积累缓冲空间
    - leverage 降低，削弱反馈放大效应（杠杆4x→2x，margin反馈减半）
    - 目标：系统在 30 步内趋向收敛或稳定振荡

world:
  name: Full-Topology-World
  max_steps: 30

break_thresholds:
  inventory: 90
  liquidity: 80
  expectation: 100
  margin: 80
  delivery: 70
  basis: 90
  rule: 70

differences:
  - id: inventory_shortage
    type: inventory
    source_node: region_A
    target_node: exchange_delivery
    magnitude: 120
    visibility: 0.95
    persistence: 0.9
    transformability: 0.9
    recurrent: true
    recurrent_rate: 0.15
    recurrent_decay: 0.95
    description: 交割地库存持续短缺（120×0.15=18/步，channel容量35，充裕）

  - id: delivery_pressure
    type: delivery
    source_node: near_month
    target_node: exchange
    magnitude: 100
    visibility: 0.95
    persistence: 0.92
    transformability: 0.7
    recurrent: true
    recurrent_rate: 0.20
    recurrent_decay: 0.93
    description: 近月交割压力持续加大（100×0.20=20/步，channel容量45，充裕）

  - id: expectation_bullish
    type: expectation
    source_node: market
    target_node: price
    magnitude: 70
    visibility: 0.85
    persistence: 0.7
    transformability: 0.8
    recurrent: true
    recurrent_rate: 0.15
    recurrent_decay: 0.95
    description: 市场看涨预期持续升温（70×0.15=10.5/步，channel容量100，充裕）

entities:
  - id: industrial_short_001
    type: industrial_short
    capacity: 50
    available_capacity: 30
    risk_tolerance: 35
    liquidity: 40
    leverage: 2.0
    preference: short
    description: 产业空头，需卖出套保但交割品不足（杠杆降低：2.5→2.0）

  - id: speculative_long_001
    type: speculator
    capacity: 80
    available_capacity: 60
    risk_tolerance: 70
    liquidity: 55
    leverage: 2.0
    preference: long
    description: 投机多头，趋势跟随（杠杆降低：4.0→2.0，margin反馈减半）

  - id: speculator_002
    type: speculator
    capacity: 60
    available_capacity: 45
    risk_tolerance: 50
    liquidity: 40
    leverage: 1.5
    preference: long
    description: 投机多头二号（杠杆降低：3.0→1.5，margin反馈减半）

  - id: exchange_001
    type: exchange
    capacity: 150
    available_capacity: 120
    risk_tolerance: 100
    liquidity: 100
    leverage: 1.0
    preference: neutral
    description: 交易所（二阶承接位置，容量有限）

channels:
  - id: warehouse_receipt_channel
    from_type: inventory
    to_type: delivery
    base_cost: 15
    capacity: 35
    openness: 0.85
    description: 库存差异→交割差异（仓单生成）
    entities:
      - industrial_short_001

  - id: delivery_channel
    from_type: delivery
    to_type: basis
    base_cost: 20
    capacity: 45
    openness: 0.8
    description: 交割差异→基差差异
    entities:
      - industrial_short_001
      - exchange_001

  - id: basis_channel
    from_type: basis
    to_type: price
    base_cost: 12
    capacity: 80
    openness: 0.9
    description: 基差差异→价格差异
    entities:
      - speculative_long_001
      - speculator_002

  - id: futures_contract_channel
    from_type: expectation
    to_type: price
    base_cost: 10
    capacity: 100
    openness: 0.95
    description: 预期差异→价格差异
    entities:
      - speculative_long_001
      - speculator_002

  - id: margin_clearing_channel
    from_type: price
    to_type: margin
    base_cost: 8
    capacity: 60
    openness: 0.9
    description: 价格差异→保证金差异
    entities:
      - speculative_long_001
      - speculator_002

  - id: position_reduction_channel
    from_type: margin
    to_type: liquidity
    base_cost: 12
    capacity: 50
    openness: 0.85
    description: 保证金差异→流动性差异
    entities:
      - speculative_long_001
      - speculator_002

  - id: exchange_rule_channel
    from_type: delivery
    to_type: rule
    base_cost: 50
    capacity: 80
    openness: 0.6
    description: 交割差异→规则调整（交易所二阶承接）
    entities:
      - exchange_001
