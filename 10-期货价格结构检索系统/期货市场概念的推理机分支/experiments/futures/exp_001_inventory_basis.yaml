experiment:
  id: exp_001
  name: 库存差异显影为基差

world:
  name: RW-Copper-World
  max_steps: 15

break_thresholds:
  inventory: 80
  liquidity: 80
  expectation: 90
  margin: 70

differences:
  - id: inventory_gap_A_B
    type: inventory
    source_node: region_A
    target_node: region_B
    magnitude: 85
    visibility: 0.9
    persistence: 0.8
    description: 地区A库存高于地区B，驱动跨地区价差

entities:
  - id: industrial_long_001
    type: industrial_long
    capacity: 100
    available_capacity: 85
    risk_tolerance: 60
    liquidity: 70
    leverage: 1.5
    preference: long
    description: 产业多头，需买入套保

  - id: speculative_fund_001
    type: speculator
    capacity: 80
    available_capacity: 70
    risk_tolerance: 80
    liquidity: 90
    leverage: 3.0
    preference: trend_following
    description: 投机资金，趋势跟随

channels:
  - id: basis_channel
    from_type: inventory
    to_type: basis
    base_cost: 15
    capacity: 100
    openness: 0.95
    description: 基差通道：库存差异→基差差异

  - id: futures_contract_channel
    from_type: inventory
    to_type: price
    base_cost: 25
    capacity: 80
    openness: 0.9
    description: 期货合约通道：库存差异→价格差异

  - id: storage_channel
    from_type: inventory
    to_type: inventory
    base_cost: 30
    capacity: 60
    openness: 0.85
    description: 仓储通道：跨区域库存转移