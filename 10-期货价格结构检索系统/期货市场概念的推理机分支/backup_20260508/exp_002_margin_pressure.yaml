experiment:
  id: exp_002
  name: 保证金压力降低承接力
  description: 保证金差异先经通道转移为流动性差异，投机者承接力被压低，产业主体也受影响

world:
  name: Margin-Pressure-World
  max_steps: 20

break_thresholds:
  inventory: 100
  liquidity: 60
  expectation: 90
  margin: 50

differences:
  - id: margin_hike
    type: margin
    source_node: exchange
    target_node: market
    magnitude: 75
    visibility: 0.95
    persistence: 0.9
    transformability: 0.8
    recurrent: true
    recurrent_rate: 0.3
    recurrent_decay: 0.95
    description: 交易所持续提高保证金，资金差异不断放大

  - id: inventory_gap
    type: inventory
    source_node: region_A
    target_node: region_B
    magnitude: 50
    visibility: 0.8
    persistence: 0.7
    recurrent: true
    recurrent_rate: 0.15
    recurrent_decay: 0.9
    description: 地区A库存持续偏低

entities:
  - id: speculative_fund_001
    type: speculator
    capacity: 80
    available_capacity: 70
    risk_tolerance: 80
    liquidity: 90
    leverage: 5.0
    preference: trend_following
    description: 高杠杆投机资金，保证金敏感

  - id: industrial_long_001
    type: industrial_long
    capacity: 100
    available_capacity: 85
    risk_tolerance: 60
    liquidity: 60
    leverage: 1.5
    preference: long
    description: 产业多头，保证金影响较小

channels:
  - id: margin_clearing_channel
    from_type: margin
    to_type: liquidity
    base_cost: 10
    capacity: 50
    openness: 0.9
    description: 保证金差异→流动性差异（容量有限，差异将积累）
    entities:
      - speculative_fund_001
      - industrial_long_001

  - id: basis_channel
    from_type: inventory
    to_type: basis
    base_cost: 15
    capacity: 80
    openness: 0.95
    description: 库存差异→基差差异
    entities:
      - industrial_long_001
      - speculative_fund_001

  - id: position_reduction_channel
    from_type: liquidity
    to_type: liquidity
    base_cost: 25
    capacity: 40
    openness: 0.7
    description: 流动性差异→减仓释放
    entities:
      - speculative_fund_001