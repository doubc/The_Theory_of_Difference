# 默认结构规则集
# 每条规则定义一种"结构类型"的约束条件

rules:
  # ─── 顶部反转类 ─────────────────────────────────────────

  - name: SlowUpFastDown_TopReversal
    description: 慢涨急跌顶部反转 — 多次接近高位压力区，缓慢上行、快速回落
    zone_source: high_cluster
    cycles:
      gte: 2
    speed_ratio:
      gt: 1.2
    time_ratio:
      gt: 1.2

  - name: FastUpSlowDown_TopDistribution
    description: 急涨慢跌顶部派发 — 快速冲高，缓慢回落，反复试探后破位
    zone_source: high_cluster
    cycles:
      gte: 2
    speed_ratio:
      lt: 0.8
    time_ratio:
      lt: 0.8

  # ─── 底部反转类 ─────────────────────────────────────────

  - name: TripleTest_BottomBreakout
    description: 底部多次试探后突破 — 低点不创新低，反复确认支撑
    zone_source: low_cluster
    cycles:
      gte: 2
    speed_ratio:
      gt: 1.0
    time_ratio:
      gt: 1.0

  - name: SlowDownFastUp_BottomReversal
    description: 慢跌急涨底部反转 — 缓慢下行触及支撑后快速反弹
    zone_source: low_cluster
    cycles:
      gte: 2
    speed_ratio:
      gt: 1.2
    time_ratio:
      gt: 1.2

  # ─── 整理类 ─────────────────────────────────────────────

  - name: BalancedConsolidation
    description: 均衡整理 — 上下速度和时间大致对称
    cycles:
      gte: 2
    speed_ratio:
      between: [0.7, 1.4]
    time_ratio:
      between: [0.7, 1.4]

  - name: HighVolatilityZone
    description: 高波动区 — 速度比极端，进出不对称
    cycles:
      gte: 2
    speed_ratio:
      gt: 2.0
