  sector: 有色金属
  multiplier: 1
  tick_size: 10
  typical_vol: 0.016
  vol_regime: high
  description: |
    锡是小金属，全球年产量仅约40万吨。主要用途是焊料（电子行业）、锡化工、镀锡板。
    供给高度集中：中国、印尼、缅甸佤邦是主要产区。缅甸佤邦停产事件曾多次引发锡价暴涨。
    库存极低时价格弹性极大，是典型的"小品种大波动"代表。关注电子行业景气度指标。

# ─── 贵金属 ────────────────────────────────────────────────
AU0:
  name: 黄金连续
  exchange: SHFE
  unit: 克
  sector: 贵金属
  multiplier: 1000
  tick_size: 0.02
  typical_vol: 0.008
  vol_regime: low
