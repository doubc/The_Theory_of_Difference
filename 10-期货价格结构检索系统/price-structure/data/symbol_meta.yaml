    普氏62%铁矿石指数是定价基准。供给端关注四大矿山发运量、巴西雨季、澳洲飓风季节。
    需求端直接挂钩钢厂高炉开工率和利润。港口库存（45港）是重要缓冲指标，1.2亿吨以下偏紧、1.5亿吨以上宽松。
    高波动品种，政策干预风险较高（如发改委价格调控）。

J0:
  name: 焦炭连续
  exchange: DCE
  unit: 吨
  sector: 黑色系
  multiplier: 100
  tick_size: 0.5
  typical_vol: 0.015
  vol_regime: high
  description: |
