    焦化利润 = 焦炭价格 - 1.33×焦煤价格 - 其他成本，利润高低决定焦化厂开工意愿。
    钢厂焦炭库存可用天数（通常10-15天）是短期需求指标。关注山西焦化行业环保政策变化。

JM0:
  name: 焦煤连续
  exchange: DCE
  unit: 吨
  sector: 黑色系
  multiplier: 60
  tick_size: 0.5
  typical_vol: 0.016
  vol_regime: high
  description: |
    焦煤是焦炭的原料，主产区在山西、内蒙古、澳大利亚。优质主焦煤资源稀缺，进口依赖度较高。
    动力煤和焦煤价格存在联动，但焦煤更偏化工属性。煤矿安监政策对供给影响极大。
    关注焦化厂焦煤库存、钢厂焦炭库存传导链条。蒙古进口通关量是边际供给变量。

# ─── 能化 ──────────────────────────────────────────────────
