# 期货品种元数据 v2 — 增强版
# 支持：中文名 / 交易所 / 单位 / 板块 / 典型波动率 / 合约乘数 / 手续费
#
# 字段说明：
#   name:      中文名
#   exchange:  交易所 (SHFE/DCE/CZCE/GFEX/CFETS)
#   unit:      计价单位
#   sector:    板块分类（用于共振检测和反差推断）
#   multiplier: 合约乘数（每手对应的吨/克/千克数）
#   tick_size:  最小变动价位
#   typical_vol: 典型日波动率（日收益率标准差的长期中位数）
#   vol_regime:  波动率特征（high/medium/low）— 品种固有属性

