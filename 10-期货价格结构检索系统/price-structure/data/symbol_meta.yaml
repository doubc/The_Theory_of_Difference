    库存周期：3-5月旺季去库、6-8月梅雨淡季累库、9-11月"金九银十"去库。冬储行情通常在12月启动。
    成本支撑：铁矿石+焦炭+废钢构成主要成本，钢厂利润是供需平衡的核心指标。

HC0:
  name: 热卷连续
