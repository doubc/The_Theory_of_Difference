# 期货品种元数据 v3 — 增强版（含独立品种描述）
# 支持：中文名 / 交易所 / 单位 / 板块 / 典型波动率 / 合约乘数 / 手续费 / 品种描述
#
# 字段说明：
#   name:        中文名
#   exchange:    交易所 (SHFE/DCE/CZCE/GFEX/CFETS)
#   unit:        计价单位
#   sector:      板块分类（用于共振检测和反差推断）
#   multiplier:  合约乘数（每手对应的吨/克/千克数）
#   tick_size:   最小变动价位
#   typical_vol: 典型日波动率（日收益率标准差的长期中位数）
#   vol_regime:  波动率特征（high/medium/low）— 品种固有属性
#   description: 品种独立描述（供需特征、价格驱动因素、季节性规律等）

# ─── 有色金属 ──────────────────────────────────────────────
CU0:
  name: 铜连续
  exchange: SHFE
  unit: 吨
  sector: 有色金属
  multiplier: 5
  tick_size: 10
  typical_vol: 0.012
  vol_regime: medium
  description: |
    铜被称为"博士金属"，是全球经济景气度的风向标。价格受全球制造业PMI、中国电网投资、新能源汽车用铜需求驱动。
    供给端关注智利、秘鲁矿山产量，以及铜精矿加工费TC/RC变化。库存方面，LME+SHFE+保税区库存是核心观测指标。
    季节性：春季（3-5月）中国开工旺季通常偏强，夏季（7-8月）消费淡季可能承压。

AL0:
  name: 铝连续
