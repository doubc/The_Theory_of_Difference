  unit: 吨
  sector: 有色金属
  multiplier: 1
  tick_size: 10
  typical_vol: 0.018
  vol_regime: high
  description: |
    镍是新能源电池（三元锂电池）和不锈钢的核心原料。印尼镍矿出口政策和NPI（镍生铁）产能是最大变量。
