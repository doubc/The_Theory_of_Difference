  tick_size: 1
  typical_vol: 0.012
  vol_regime: medium
  description: |
    热轧卷板主要用于汽车制造、机械制造、集装箱。与螺纹钢相比，热卷下游更偏制造业而非房地产。
    冷热轧价差是重要套利指标，通常热卷价格高于螺纹钢。关注汽车产销数据和制造业PMI。
    出口方面，热卷是中国钢材出口的主要品种，出口退税政策变化对价格影响显著。

