    铅的主要需求来自铅酸蓄电池（汽车启动电池+电动自行车电池）。新能源汽车对铅酸电池的替代是长期压制因素。
    供给端相对集中，再生铅占比逐年提升。环保政策对再生铅产能的影响较大。
    季节性明显：夏季（7-8月）和冬季（11-12月）电池更换旺季通常偏强。

NI0:
  name: 镍连续
