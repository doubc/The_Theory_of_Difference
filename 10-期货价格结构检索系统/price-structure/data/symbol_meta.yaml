  tick_size: 5
  typical_vol: 0.009
  vol_regime: low
  description: |
    铝是典型的高能耗品种，电力成本占生产成本的40%以上。中国产能天花板（4500万吨）和云南水电季节性是核心变量。
    供给端关注电解铝开工率、氧化铝价格、以及云南/广西等水电丰富地区的产能波动。
    需求端主要来自建筑型材、汽车轻量化、包装。库存方面，铝锭社会库存是短期价格敏感指标。

ZN0:
  name: 锌连续
