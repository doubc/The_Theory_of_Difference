# ─────────────────────────────────────────────────────────────
# L3 市场知识 — Context → Wisdom
# 回答「结合品种特征和市场环境，有什么值得注意的」
# ─────────────────────────────────────────────────────────────

rules:
  # ── 品种特异性知识 ──
  - id: "L3-001"
    name: "铜 Zone 带宽常识"
    symbol: "CU"
    when:
      - field: "symbol"
        op: "=="
        value: "CU"
    wisdom: "铜的 Zone 带宽通常 1-2%，超过 3% 说明市场状态异常"
    normal_bandwidth: [0.01, 0.02]
    alert_bandwidth: 0.03
    source: "品种经验"

  - id: "L3-002"
    name: "螺纹钢高波动特征"
    symbol: "RB"
    when:
      - field: "symbol"
        op: "=="
        value: "RB"
    wisdom: "螺纹钢日均波动大，Zone 带宽容忍度高于有色品种"
    source: "品种经验"

  - id: "L3-003"
    name: "原油宏观锚定"
    symbol: "SC"
    when:
      - field: "symbol"
        op: "=="
        value: "SC"
    wisdom: "原油是宏观情绪的风向标，其结构变化常领先于其他能化品种"
    source: "品种经验 + 宏观分析"

  # ── 反差类型知识 ──
  - id: "L3-010"
    name: "政策驱动结构特征"
    when:
      - field: "contrast_type"
        op: "=="
        value: "POLICY"
    wisdom: "政策驱动型结构试探间隔均匀，反弹快但持续性差，适合短线不适合趋势跟踪"
    source: "ContrastType 定义 + 经验"

  - id: "L3-011"
    name: "恐慌性结构特征"
    when:
      - field: "contrast_type"
        op: "=="
        value: "PANIC"
    wisdom: "恐慌性结构 30 天内密集试探，反弹猛烈但不稳定，等待二次确认"
    source: "ContrastType 定义"

  - id: "L3-012"
    name: "过剩型结构特征"
    when:
      - field: "contrast_type"
        op: "=="
        value: "OVERSUPPLY"
    wisdom: "过剩型结构底部试探次数多，突破需要外部催化剂（减产/政策）"
    source: "ContrastType 定义"

  # ── 形态知识 ──
  - id: "L3-020"
    name: "慢涨急跌·顶部反转"
    when:
      - field: "speed_pattern"
        op: "=="
        value: "slow_rise_fast_drop"
    wisdom: "慢涨急跌是顶部反转的经典形态——上涨犹豫、下跌果断"
    source: "DSL规则 + 经验"

  - id: "L3-021"
    name: "急涨慢跌·派发特征"
    when:
      - field: "speed_pattern"
        op: "=="
        value: "fast_rise_slow_drop"
    wisdom: "急涨慢跌是顶部派发的典型特征——拉高出货，缓慢阴跌"
    source: "DSL规则 + 经验"

  # ── 阶段知识 ──
  - id: "L3-030"
    name: "突破阶段关注量"
    when:
      - field: "phase_tendency"
        op: "=="
        value: "breakout"
    wisdom: "突破阶段需要成交量配合确认，无量突破多为假突破"
    source: "技术分析经验"

  - id: "L3-031"
    name: "确认阶段耐心"
    when:
      - field: "phase_tendency"
        op: "=="
        value: "confirmation"
    wisdom: "确认阶段需要耐心等待，过早入场可能遭遇二次回测"
    source: "交易经验"

  # ── 跨品种联动知识 ──
  - id: "L3-040"
    name: "铜铝联动"
    when:
      - field: "symbol"
        op: "in"
        value: ["CU", "AL"]
    wisdom: "铜铝同属有色板块，铜通常领先铝 1-2 周见顶/见底"
    source: "跨品种经验"

  - id: "L3-041"
    name: "黑色板块联动"
    when:
      - field: "symbol"
        op: "in"
        value: ["RB", "HC", "I", "J"]
    wisdom: "黑色板块高度联动，螺纹钢定价核心在需求端（地产/基建），铁矿石在供给端"
    source: "产业链分析"

  - id: "L3-042"
    name: "金银比价"
    when:
      - field: "symbol"
        op: "in"
        value: ["AU", "AG"]
    wisdom: "金银比价>80 时白银相对低估，<50 时白银相对高估；比价极端时关注贵金属板块反转"
    source: "贵金属经验"

  # ── 更多品种特异性 ──
  - id: "L3-050"
    name: "螺纹钢需求驱动"
    symbol: "RB"
    when:
      - field: "symbol"
        op: "=="
        value: "RB"
    wisdom: "螺纹钢定价核心在需求端（地产/基建），政策刺激初期通常先涨螺纹再涨原料"
    source: "产业链分析"

  - id: "L3-051"
    name: "铝的成本约束"
    symbol: "AL"
    when:
      - field: "symbol"
        op: "=="
        value: "AL"
    wisdom: "铝是高耗能品种，电价政策和产能天花板是价格底部支撑；铝价低于成本线 3 个月以上关注做多机会"
    source: "品种经验"

  - id: "L3-052"
    name: "锌的库存信号"
    symbol: "ZN"
    when:
      - field: "symbol"
        op: "=="
        value: "ZN"
    wisdom: "锌的库存变化领先价格 1-2 周，LME 锌库存骤降时关注结构性做多机会"
    source: "品种经验"

  - id: "L3-053"
    name: "黄金避险属性"
    symbol: "AU"
    when:
      - field: "symbol"
        op: "=="
        value: "AU"
    wisdom: "黄金与美元指数负相关，地缘冲突/衰退预期时避险买盘驱动；加息末期黄金通常提前见底"
    source: "品种经验 + 宏观分析"

  - id: "L3-054"
    name: "白银工业属性"
    symbol: "AG"
    when:
      - field: "symbol"
        op: "=="
        value: "AG"
    wisdom: "白银兼具贵金属和工业属性，光伏需求增长时白银弹性大于黄金；金银比价极端修复时白银波动剧烈"
    source: "品种经验"

  - id: "L3-055"
    name: "碳酸锂价格周期"
    symbol: "LC"
    when:
      - field: "symbol"
        op: "=="
        value: "LC"
    wisdom: "碳酸锂价格受新能源车销量和电池厂库存周期影响大，价格波动剧烈（日波动 5-10% 常见），Zone 带宽容忍度需高于传统品种"
    source: "品种经验"

  - id: "L3-056"
    name: "原油库存周期"
    symbol: "SC"
    when:
      - field: "symbol"
        op: "=="
        value: "SC"
    wisdom: "原油去库周期价格易涨难跌，累库周期反之；EIA 周三数据发布前后波动率通常放大"
    source: "品种经验"

  # ── 更多跨品种联动 ──
  - id: "L3-060"
    name: "油化工联动"
    when:
      - field: "symbol"
        op: "in"
        value: ["SC", "BU", "TA", "MA", "PF"]
    wisdom: "能化板块以原油为锚，原油结构变化通常领先下游品种 3-5 个交易日"
    source: "产业链分析"

  - id: "L3-061"
    name: "钢铁产业链联动"
    when:
      - field: "symbol"
        op: "in"
        value: ["RB", "HC", "I", "J", "JM"]
    wisdom: "钢铁产业链利润分配：螺纹→热卷→铁矿→焦炭→焦煤，利润压缩到极致时关注做多钢厂利润"
    source: "产业链分析"

  - id: "L3-062"
    name: "油脂油料联动"
    when:
      - field: "symbol"
        op: "in"
        value: ["M", "Y", "P", "OI"]
    wisdom: "豆油/棕榈油/菜油价差回归是常见策略；豆粕需求受生猪存栏影响，油脂受生物柴油政策影响"
    source: "农产品经验"

  # ── 更多形态知识 ──
  - id: "L3-070"
    name: "缩量突破"
    when:
      - field: "volume_pattern"
        op: "=="
        value: "shrinking_breakout"
    wisdom: "缩量突破通常是假突破——突破需要成交量放大确认，无量突破多为诱多/诱空"
    source: "技术分析经验"

  - id: "L3-071"
    name: "放量滞涨"
    when:
      - field: "volume_pattern"
        op: "=="
        value: "high_vol_stagnant"
    wisdom: "放量滞涨是顶部信号——成交量创新高但价格不创新高，说明分歧加大"
    source: "技术分析经验"

  - id: "L3-072"
    name: "底部放量"
    when:
      - field: "volume_pattern"
        op: "=="
        value: "bottom_volume_surge"
    wisdom: "底部放量通常是反转信号——恐慌性抛售后的承接盘入场，关注后续 2-3 天确认"
    source: "技术分析经验"

  # ── 宏观环境知识 ──
  - id: "L3-080"
    name: "加息周期商品承压"
    when:
      - field: "macro_env"
        op: "=="
        value: "rate_hiking"
    wisdom: "加息周期商品整体承压，但供给受限品种（铜/铝）相对抗跌；加息末期关注贵金属底部"
    source: "宏观分析"

  - id: "L3-081"
    name: "衰退预期商品承压"
    when:
      - field: "macro_env"
        op: "=="
        value: "recession_fear"
    wisdom: "衰退预期下工业品（铜/铝/螺纹）承压，贵金属避险属性凸显；关注铜金比作为衰退指标"
    source: "宏观分析"

  - id: "L3-082"
    name: "通胀预期商品支撑"
    when:
      - field: "macro_env"
        op: "=="
        value: "inflation_hedge"
    wisdom: "高通胀环境下商品整体有支撑，贵金属和原油是天然的通胀对冲工具"
    source: "宏观分析"
